<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>自动出票数据看板 · v5</title>
<style>html, body { background: #0a0e1a; margin: 0; }</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"
        onerror="this.onerror=null;this.src='https://unpkg.com/echarts@5/dist/echarts.min.js'"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    background: #0a0e1a;
    color: #e0e6f0;
    padding: 0 20px;
    margin: 0;
  }
  /* 自适应：屏幕很宽（>1750px）时让布局居中避免拉伸 */
  .layout-wrapper {
    max-width: 100%;
  }
  .title {
    text-align: center;
    color: #00e5ff;
    font-size: 26px;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #7a8ba0;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .layout {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
    max-width: 100%;      /* 撑满 Streamlit 容器，不再有左右空白 */
    margin: 0;
  }
  /* 自适应：超窄屏（<900px）侧边栏与主区上下排版，避免挤压 */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
  .sidebar {
    background: #0f1626;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 14px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }
  .logo {
    color: #00e5ff;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e3a5f;
  }
  .nav-item {
    padding: 10px 12px;
    margin-bottom: 5px;
    background: #131c30;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    color: #b0c4de;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-item:hover { border-color: #00e5ff; }
  .nav-item.active {
    background: linear-gradient(135deg, #0a1a2e, #131c30);
    border-color: #00e5ff;
    color: #00e5ff;
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
  }
  .nav-section {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #1e3a5f;
  }
  .nav-section-title {
    font-size: 10px;
    color: #5a6b80;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .nav-mini {
    padding: 7px 11px;
    font-size: 11px;
    background: #0a0e1a;
    border: 1px solid #1e3a5f;
    border-radius: 4px;
    color: #7a8ba0;
    margin-bottom: 4px;
  }
  .main { display: flex; flex-direction: column; gap: 16px; }
  .section {
    background: #0f1626;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 18px;
  }
  .section-title {
    color: #00e5ff;
    font-size: 15px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  .section-title::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #00e5ff;
    border-radius: 2px;
  }
  .section-title .badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-warn { background: #ffa50220; color: #ffa502; border: 1px solid #ffa50240; }
  .badge-danger { background: #ff475720; color: #ff4757; border: 1px solid #ff475740; }
  .badge-info { background: #00e5ff20; color: #00e5ff; border: 1px solid #00e5ff40; }
  .badge-success { background: #00ff8820; color: #00ff88; border: 1px solid #00ff8840; }
  .kpi-row {
    display: grid;
    gap: 12px;
  }
  .kpi-row.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .kpi-row.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .kpi-row.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .kpi-row.cols-7 { grid-template-columns: repeat(7, 1fr); }
  .kpi {
    background: #131c30;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 14px;
    position: relative;
    transition: all 0.2s;
  }
  .kpi:hover { border-color: #00e5ff; transform: translateY(-2px); }
  .kpi.warning { border-color: #ffa50280; }
  .kpi.danger { border-color: #ff475780; }
  .kpi.success { border-color: #00ff8880; }
  /* 2026-07-20 新增: KPI 卡片颜色按对比变化动态切换
   * 正向指标 (good): 涨=绿(up-good) 跌=红(down-good) 不变=黄(flat)
   * 负向指标 (bad) : 涨=红(up-bad)  跌=绿(down-bad)  不变=黄(flat)
   * 用法: <div class="kpi up-good"> 或 <div class="kpi down-bad"> ...
   */
  .kpi.up-good { border-color: #00ff8880; }
  .kpi.up-good .kpi-value { color: #00ff88; }
  .kpi.up-bad { border-color: #ff475780; }
  .kpi.up-bad .kpi-value { color: #ff4757; }
  .kpi.down-good { border-color: #ff475780; }
  .kpi.down-good .kpi-value { color: #ff4757; }
  .kpi.down-bad { border-color: #00ff8880; }
  .kpi.down-bad .kpi-value { color: #00ff88; }
  .kpi.flat { border-color: #ffa50280; }
  .kpi.flat .kpi-value { color: #ffa502; }
  .kpi-label {
    color: #7a8ba0;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
  }
  .kpi-value.green { color: #00ff88; }
  .kpi-value.red { color: #ff4757; }
  .kpi-value.yellow { color: #ffa502; }
  .kpi-sub {
    font-size: 11px;
    color: #7a8ba0;
    margin-top: 4px;
  }
  .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-1x2 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
  .grid-1x3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .chart-box {
    background: #131c30;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 14px;
  }
  .chart-title {
    color: #b0c4de;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chart-area { width: 100%; }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  /* 失败根因下钻面板 */
  .drill-row { background: #0a1424; }
  .drill-row:hover { background: #0a1424; }
  .drill-panel { padding: 12px 18px; background: #0a1424; border-left: 3px solid #00e5ff; }
  .drill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .drill-title { font-size: 14px; font-weight: 600; }
  .drill-close { background: transparent; border: 1px solid #2a4a6e; color: #b0c4de; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .drill-close:hover { background: #1e3a5f; color: #fff; }
  .drill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .drill-chart { background: #0a1a2e; border: 1px solid #1e3a5f; border-radius: 6px; padding: 10px; }
  .drill-wide { grid-column: 1 / -1; }
  .drill-chart-title { color: #00e5ff; font-size: 12px; font-weight: 600; margin-bottom: 8px; padding-left: 4px; border-left: 2px solid #00e5ff; }
  .family-subtable { margin-top: 8px; }
  .family-subtable .data-table { font-size: 11px; }
  /* 4 路径对比表（紧凑版） */
  .path-compare-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
  .path-compare-table th { padding: 5px 8px; color: #7a8ba0; font-weight: 500; border-bottom: 1px solid #1e3a5f; background: #0a0e1a; text-align: right; }
  .path-compare-table th:first-child { text-align: left; }
  .path-compare-table td { padding: 5px 8px; border-bottom: 1px solid #1e3a5f40; color: #b0c4de; text-align: right; }
  .path-compare-table td:first-child { text-align: left; font-weight: 600; }
  .drill-btn { background: #0a1a2e; border: 1px solid #1e3a5f; color: #00e5ff; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
  .drill-btn:hover { background: #1e3a5f; color: #fff; }
  .data-table th {
    text-align: left;
    padding: 8px 10px;
    color: #7a8ba0;
    font-weight: 500;
    border-bottom: 1px solid #1e3a5f;
    background: #0a0e1a;
    position: sticky;
    top: 0;
  }
  .data-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #1e3a5f;
    color: #b0c4de;
  }
  .data-table tr:hover td { background: #0a1a2e; }
  .insight-box {
    background: linear-gradient(90deg, #ff475715, #ff475705);
    border-left: 3px solid #ff4757;
    padding: 10px 14px;
    border-radius: 4px;
    color: #b0c4de;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .insight-box.warning {
    background: linear-gradient(90deg, #ffa50215, #ffa50205);
    border-left-color: #ffa502;
  }
  .insight-box.warning .insight-title { color: #ffa502; }
  .insight-box.info {
    background: linear-gradient(90deg, #00e5ff15, #00e5ff05);
    border-left-color: #00e5ff;
  }
  .insight-box.info .insight-title { color: #00e5ff; }
  .insight-box.success {
    background: linear-gradient(90deg, #00ff8815, #00ff8805);
    border-left-color: #00ff88;
  }
  .insight-box.success .insight-title { color: #00ff88; }
  .insight-title { color: #ff4757; font-weight: 600; margin-bottom: 4px; }
  .data-overview {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    background: #0a0e1a;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    color: #7a8ba0;
    margin-bottom: 12px;
  }
  .data-overview b { color: #00e5ff; }
  .pos { color: #00ff88; }
  .neg { color: #ff4757; }
  /* D30：各平台对比前日 表格 涨/降/不变 配色 */
  .delta-pos { color: #00ff88; font-size: 11px; }
  .delta-neg { color: #ff4757; font-size: 11px; }
  .delta-zero { color: #7a8ba0; font-size: 11px; }
  .delta-cell { line-height: 1.5; }
  .loading {
    color: #7a8ba0;
    text-align: center;
    padding: 30px;
    font-size: 13px;
  }

  /* 月份切换器 */
  .month-switcher {
    background: linear-gradient(135deg, #0a1a2e, #131c30);
    border: 1px solid #00e5ff60;
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .month-switcher label {
    color: #00e5ff;
    font-size: 13px;
    font-weight: 600;
  }
  .month-switcher select {
    background: #0a0e1a;
    border: 1px solid #00e5ff80;
    color: #e0e6f0;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }
  .month-switcher select:hover { border-color: #00e5ff; }
  .month-switcher .month-info {
    color: #7a8ba0;
    font-size: 12px;
    margin-left: auto;
  }
  .month-switcher .month-info b { color: #00e5ff; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #7a8ba0;
  }
  .empty-state h2 { color: #00e5ff; margin-bottom: 12px; }
  .empty-state code {
    background: #0a0e1a;
    border: 1px solid #1e3a5f;
    padding: 6px 12px;
    border-radius: 4px;
    color: #00e5ff;
    display: inline-block;
    margin-top: 12px;
  }

  .chart-hint {
    color: #7a8ba0;
    font-size: 12px;
    margin: 4px 0 8px;
  }
  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .detail-table th {
    background: #131c30;
    color: #00e5ff;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #1e3a5f;
  }
  .detail-table td {
    padding: 6px 12px;
    border-bottom: 1px solid #1e3a5f40;
    color: #e0e6f0;
  }
  .detail-table tr:hover td { background: #0a1a2e; }

  .cmp-badge {
    display: inline-block;
    background: #0a0e1a;
    border: 1px solid #1e3a5f;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    margin-left: 6px;
    font-weight: 500;
  }
  .cmp-no {
    color: #5a6b80;
    font-size: 11px;
    margin-left: 6px;
  }
  .kpi-sub-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="title">📊 自动出票数据看板</div>
  <div class="subtitle" id="subtitle">v5 · 数据驱动 ECharts 实时渲染</div>

  <div class="layout">
    <div class="sidebar">
      <div class="logo">🚀 出票看板 v5</div>
      <div class="nav-item active" data-page="overview">📊 数据总览</div>
      <div class="nav-item" data-page="hourly">🕐 时段分析</div>
      <div class="nav-item" data-page="airline">✈️ 航司分析</div>
      <div class="nav-item" data-page="platform">🏢 平台分析</div>
      <div class="nav-item" data-page="channel">🛒 渠道分析</div>
      <div class="nav-item" data-page="staff">👥 人员绩效</div>
      <div class="nav-item" data-page="failAnalysis">🔍 失败分析</div>
      <div class="nav-section">
        <div class="nav-section-title">📊 数据</div>
        <div class="nav-mini" id="navDateRange">5月1-31日</div>
        <div class="nav-mini" id="navTotalOrders">86,721 单</div>
        <div class="nav-mini" id="navDimCount">44 航司 / 9 平台 / 36 渠道</div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">💡 业务定义</div>
        <div class="nav-mini">A 全自动成功</div>
        <div class="nav-mini">B 全自动失败</div>
        <div class="nav-mini">C 订单转人工</div>
      </div>
    </div>

    <div class="main">
      <div class="month-switcher" id="monthSwitcher" style="display:none">
        <label>📅 月份</label>
        <select id="monthSelect"></select>
        <label>📊 周</label>
        <select id="weekSelect">
          <option value="all">全月</option>
        </select>
        <label>📆 日</label>
        <select id="daySelect">
          <option value="all">全月</option>
        </select>
        <div class="month-info" id="monthInfo"></div>
      </div>
      <div id="mainArea">
        <div class="loading">⏳ 加载数据中…</div>
      </div>
    </div>
  </div>

<script>
/* ============== 数据加载 ============== */
let DATA = null;          // 完整的多月数据 {available_months, current_month, months: {...}}
let CURRENT_DATA = null;  // 当前选中的数据（可能是月或日或全月）
// v10.14.7: failAnalysis 根据"选月/选日"切换数据源，存全局变量供 toggleFamilyDrill 用
let CURRENT_FAIL_FAMILIES_B = null;
let CURRENT_FAIL_FAMILIES_D = null;
let CURRENT_FAIL_REASONS_B = null;
let CURRENT_FAIL_REASONS_D = null;
let CURRENT_FAIL_VIEW = "monthly";  // "monthly" or "daily"
let CURRENT_MONTH = null; // 当前月份
let CURRENT_DAY = "all";  // 当前日（"all"=全月，"01"~"31"=具体日）
let CURRENT_WEEK = "all"; // 当前周（"all"=全月，"W1"~"W5"=自然周）
let COMPARE_DATA = null;  // 对比基准数据（上一周期）
let COMPARE_LABEL = "";   // 对比基准的标签
const chartInstances = {};

async function loadData() {
  try {
    // 优先从 window.__DASHBOARD_DATA__ 读取（Streamlit 部署用）
    // 本地直接打开时（双击 .html）回退到 fetch
    let data;
    if (typeof window.__DASHBOARD_DATA__ !== "undefined" && window.__DASHBOARD_DATA__) {
      data = window.__DASHBOARD_DATA__;
    } else {
      // 2026-07-17 改：本地 / Streamlit 都走 jsDelivr CDN
      // 用最新 commit hash 作 URL 段，**绕过 jsDelivr CDN 缓存**（每次 commit 变 URL，jsDelivr 当新 URL 返回）
      // streamlit cloud 不会自动 re-deploy，必须手动 Reboot app 才能拉到这个新 HTML
      // 2026-07-20 优化: 去掉 { cache: "no-store" }，让浏览器缓存同 URL 的数据
      // - CDN 缓存 bust 靠 COMMIT 变 URL（commit 变 → URL 变 → 浏览器/CDN 都当新 URL 拉）
      // - 浏览器缓存: 同一 URL 二次访问秒开（不再每次都拉 1.3MB）
      // - 实测: 1.3MB gzip 走 jsDelivr 约 3-4s, raw 15MB 不带 gzip 头 100s+
      const COMMIT = "e729de9";  // ← 每次 git push 后手动改成最新 commit 前 7 位
      const DATA_URL = `https://cdn.jsdelivr.net/gh/yikedashua-create/auto-ticket-dashboard@${COMMIT}/dashboard_data.json`;
      const resp = await fetch(DATA_URL);  // 走默认缓存策略 (浏览器自动用缓存)
      data = await resp.json();
    }
    DATA = data;

    // 兼容旧版：如果 JSON 没有 months 字段，包装一下
    if (!DATA.months) {
      DATA.months = { "all": DATA };
      DATA.available_months = ["all"];
      DATA.current_month = "all";
    }

    // 初始化月份切换器
    initMonthSwitcher();
    switchPeriod(DATA.current_month, "all");
  } catch (e) {
    document.getElementById("mainArea").innerHTML =
      '<div class="loading" style="color:#ff4757">❌ 数据加载失败：' + e.message +
      '<br><br>请用 Python 起本地服务：<br><code style="color:#00e5ff">python -m http.server 8000</code><br>然后浏览器打开 http://localhost:8000/dashboard_v5.html</div>';
  }
}

function initMonthSwitcher() {
  const monthSel = document.getElementById("monthSelect");
  const sw = document.getElementById("monthSwitcher");
  sw.style.display = "flex";
  monthSel.innerHTML = DATA.available_months.map(m => {
    const label = m === "all" ? "全部月份" : m;
    return `<option value="${m}">${label}</option>`;
  }).join("");
  monthSel.value = DATA.current_month;
  monthSel.addEventListener("change", e => {
    CURRENT_WEEK = "all";
    updateWeekOptions(e.target.value);
    updateDayOptions(e.target.value, "all");
    switchPeriod(e.target.value, "all", "all");
  });
  document.getElementById("weekSelect").addEventListener("change", e => {
    CURRENT_DAY = "all";
    updateDayOptions(CURRENT_MONTH, e.target.value);
    switchPeriod(CURRENT_MONTH, "all", e.target.value);
  });
  document.getElementById("daySelect").addEventListener("change", e => {
    CURRENT_WEEK = "all";
    switchPeriod(CURRENT_MONTH, e.target.value, "all");
  });
  updateWeekOptions(DATA.current_month);
  updateDayOptions(DATA.current_month, "all");
}

function updateWeekOptions(month) {
  const weekSel = document.getElementById("weekSelect");
  let weeks = [];
  if (month === "all") {
    Object.values(DATA.months).forEach(m => {
      if (m.summary && m.summary.natural_weekly) {
        m.summary.natural_weekly.forEach(w => weeks.push({ ...w, _month: m.month }));
      }
    });
  } else {
    const m = DATA.months[month];
    if (m && m.summary && m.summary.natural_weekly) {
      weeks = m.summary.natural_weekly;
    }
  }
  // 月+周用 _month 区分
  const opts = ['<option value="all">全月</option>'];
  const seen = new Set();
  weeks.forEach(w => {
    const key = w._month ? `${w._month}-${w.week}` : `${month || "all"}-${w.week}`;
    if (seen.has(key)) return;
    seen.add(key);
    const monthLabel = w._month || month || "all";
    opts.push(`<option value="${monthLabel}|${w.week}">${monthLabel} ${w.week}（${w.date_range}）</option>`);
  });
  weekSel.innerHTML = opts.join("");
  weekSel.value = "all";
}

function updateDayOptions(month, week) {
  const daySel = document.getElementById("daySelect");
  let dates = [];
  // 2026-07-18 改造：周选中时，只列该周内日期
  if (week && week !== "all" && month !== "all") {
    // week = "2026-07|W1" 格式
    const [mKey, wKey] = week.split("|");
    const m = DATA.months[mKey];
    if (m && m.summary && m.summary.natural_weekly) {
      const w = m.summary.natural_weekly.find(x => x.week === wKey);
      if (w) dates = w.days;
    }
  } else if (month === "all") {
    Object.values(DATA.months).forEach(m => {
      if (m.daily) m.daily.forEach(d => dates.push(d.date));
    });
    dates = [...new Set(dates)].sort();
  } else {
    const m = DATA.months[month];
    if (m && m.daily) dates = m.daily.map(d => d.date);
  }
  daySel.innerHTML = `<option value="all">全${week && week !== "all" ? "周" : "月"}</option>` + dates.map(d => {
    const day = d.substring(8, 10);
    return `<option value="${day}">${day} 日</option>`;
  }).join("");
  daySel.value = "all";
}

/* 计算"上一周期"：用于对比 */
function getComparePeriod(month, day, week) {
  if (day !== "all") {
    // 选某日：对比前一日（跨月就跨月）
    const dt = new Date(month + "-" + day);
    dt.setDate(dt.getDate() - 1);
    const prev = dt.toISOString().substring(0, 10);
    const prevMonth = prev.substring(0, 7);
    return { type: "day", month: prevMonth, day: prev.substring(8, 10), label: prev };
  } else if (week && week !== "all") {
    // 选周：对比上一周（同月 W(N-1)，或上月最后一周）
    // week = "2026-07|W1" 格式
    const [mKey, wKey] = week.split("|");
    const wNum = parseInt(wKey.substring(1));
    const m = DATA.months[mKey];
    if (!m || !m.summary || !m.summary.natural_weekly) return null;
    if (wNum > 1) {
      // 同月上一周
      const prev = m.summary.natural_weekly.find(x => x.week === `W${wNum - 1}`);
      if (prev) return { type: "week", week: `${mKey}|${prev.week}`, label: `${mKey} ${prev.week}（${prev.date_range}）` };
      return null;
    } else {
      // W1 → 上月最后一周
      const months = DATA.available_months.filter(x => x !== "all").sort();
      const idx = months.indexOf(mKey);
      if (idx <= 0) return null;
      const prevMonth = months[idx - 1];
      const pm = DATA.months[prevMonth];
      if (!pm || !pm.summary || !pm.summary.natural_weekly) return null;
      const weeks = pm.summary.natural_weekly;
      const last = weeks[weeks.length - 1];
      return { type: "week", week: `${prevMonth}|${last.week}`, label: `${prevMonth} ${last.week}（${last.date_range}）` };
    }
  } else {
    // 选全月：对比上月（找 available_months 里前一月）
    if (month === "all") {
      // 全月对比：选"上一个月份的全月"
      const months = DATA.available_months.filter(m => m !== "all").sort();
      if (months.length < 2) return null;
      const lastMonth = months[months.length - 2];
      return { type: "month", month: lastMonth, day: "all", label: lastMonth + " 全月" };
    } else {
      const idx = DATA.available_months.indexOf(month);
      if (idx <= 0) return null;
      const prevMonth = DATA.available_months[idx - 1];
      return { type: "month", month: prevMonth, day: "all", label: prevMonth + " 全月" };
    }
  }
}

/* 计算某月某日的数据（从 daily 字段取） */
function getDayData(month, day) {
  const m = DATA.months[month];
  if (!m) return null;
  const target = month + "-" + day;
  // 优先用 daily_detail（按日完整聚合数据，包含 fail_reasons / stage 等）
  if (m.daily_detail && m.daily_detail[target]) {
    const detail = m.daily_detail[target];
    return { ...detail, _period_type: "day", _period_date: target };
  }
  // 降级：只用 daily 单行（无详细数据）
  if (!m.daily) return null;
  const d = m.daily.find(x => x.date === target);
  if (!d) return null;
  return aggregateDayToMonthShape(m, d);
}

/* 计算某月某周的数据（按日聚合 + 合并 daily_detail）
   weekKey 格式: "2026-07|W1" */
function getWeekData(weekKey) {
  const [mKey, wKey] = weekKey.split("|");
  const m = DATA.months[mKey];
  if (!m || !m.summary || !m.summary.natural_weekly) return null;
  const weekInfo = m.summary.natural_weekly.find(w => w.week === wKey);
  if (!weekInfo) return null;
  const days = weekInfo.days;
  const dailyRows = (m.daily || []).filter(d => days.includes(d.date));
  if (dailyRows.length === 0) return null;

  // 聚合 summary
  const total = dailyRows.reduce((s, r) => s + r.total, 0);
  const A = dailyRows.reduce((s, r) => s + r.A, 0);
  const B = dailyRows.reduce((s, r) => s + r.B, 0);
  const C = dailyRows.reduce((s, r) => s + r.C, 0);
  const D = dailyRows.reduce((s, r) => s + r.D, 0);
  const profit_sum = dailyRows.reduce((s, r) => s + r.profit_sum, 0);
  const profit_pos = dailyRows.reduce((s, r) => s + r.profit_pos, 0);
  const auto = A + B;

  // 合并 daily_detail（用于下钻）
  const daily_detail = {};
  days.forEach(d => {
    if (m.daily_detail && m.daily_detail[d]) daily_detail[d] = m.daily_detail[d];
  });

  return {
    ...m,
    summary: {
      month: `${mKey} ${wKey}`,
      total_days: days.length,
      total_orders: total,
      A, B, C, D,
      A_ratio: total ? A / total * 100 : 0,
      B_ratio: total ? B / total * 100 : 0,
      C_ratio: total ? C / total * 100 : 0,
      D_ratio: total ? D / total * 100 : 0,
      auto_coverage_rate: total ? auto / total * 100 : 0,
      auto_succ_rate: auto ? A / auto * 100 : 0,
      B_to_manual_rate: total ? B / total * 100 : 0,
      total_profit: profit_sum,
      avg_profit: total ? profit_sum / total : 0,
      profit_pos,
      profit_pos_rate: total ? profit_pos / total * 100 : 0,
      natural_weekly: [weekInfo],  // 保留周数据供 renderWeekly 用
    },
    daily: dailyRows,
    daily_detail,
    _period_type: "week",
    _period_date: weekInfo.date_range,
  };
}

/* 把 daily 单行包装成 month-data 同等结构（降级方案） */
function aggregateDayToMonthShape(monthData, dayRow) {
  return {
    ...monthData,
    summary: {
      month: dayRow.date,
      total_days: 1,
      total_orders: dayRow.total,
      A: dayRow.A, B: dayRow.B, C: dayRow.C, D: dayRow.D,
      A_ratio: dayRow.total ? dayRow.A / dayRow.total * 100 : 0,
      B_ratio: dayRow.total ? dayRow.B / dayRow.total * 100 : 0,
      C_ratio: dayRow.total ? dayRow.C / dayRow.total * 100 : 0,
      D_ratio: dayRow.total ? dayRow.D / dayRow.total * 100 : 0,
      auto_coverage_rate: dayRow.auto_coverage_rate,
      auto_succ_rate: dayRow.auto_succ_rate,
      B_to_manual_rate: dayRow.B_ratio,
      total_profit: dayRow.profit_sum,
      avg_profit: dayRow.avg_profit,
      profit_pos: dayRow.profit_pos,
      profit_pos_rate: dayRow.profit_pos_rate,
    },
    daily: [dayRow],
    _period_type: "day",
    _period_date: dayRow.date,
  };
}

function switchPeriod(month, day, week) {
  Object.keys(chartInstances).forEach(k => destroyChart(k));

  CURRENT_MONTH = month;
  CURRENT_DAY = day;
  CURRENT_WEEK = week || "all";

  // 算对比基准
  const comparePeriod = getComparePeriod(month, day, week);
  if (comparePeriod) {
    if (comparePeriod.type === "day") {
      COMPARE_DATA = getDayData(comparePeriod.month, comparePeriod.day);
    } else if (comparePeriod.type === "week") {
      COMPARE_DATA = getWeekData(comparePeriod.week);
    } else {
      COMPARE_DATA = DATA.months[comparePeriod.month] || null;
    }
    COMPARE_LABEL = comparePeriod.label;
  } else {
    COMPARE_DATA = null;
    COMPARE_LABEL = "无上一周期数据";
  }

  // 算当前数据
  if (day !== "all") {
    CURRENT_DATA = getDayData(month, day);
  } else if (week && week !== "all") {
    // 选周：week 格式 "2026-07|W1"
    CURRENT_DATA = getWeekData(week);
  } else {
    CURRENT_DATA = DATA.months[month];
  }

  if (!CURRENT_DATA) {
    document.getElementById("mainArea").innerHTML = `
      <div class="empty-state">
        <h2>📭 ${month} ${day !== "all" ? day + " 日" : (week && week !== "all" ? week : "")} 没有数据</h2>
        <p>把对应日期的 xlsx 放到桌面「出票总订单数据」目录，然后跑：</p>
        <code>python gen_dashboard_data.py</code>
        <p style="margin-top: 20px; color:#5a6b80">可用月份：${DATA.available_months.join("、") || "无"}</p>
      </div>`;
    document.getElementById("monthInfo").textContent = "0 单 / 0 天";
    return;
  }

  const s = CURRENT_DATA.summary;
  const periodLabel = day !== "all" ? `${month} ${day} 日`
    : (week && week !== "all" ? `${month} ${week.split("|")[1]}（${CURRENT_DATA._period_date}）`
    : (month === "all" ? "全部月份" : month));
  document.getElementById("monthInfo").innerHTML =
    `<b>${s.total_orders.toLocaleString()}</b> 单 · <b>${s.total_days}</b> 天 · ` +
    `利润 <b style="color:${s.total_profit >= 0 ? '#00ff88' : '#ff4757'}">${s.total_profit >= 0 ? '+' : ''}¥${s.total_profit.toLocaleString()}</b>` +
    (COMPARE_DATA ? ` <span style="color:#7a8ba0;font-size:11px">· 对比 ${COMPARE_LABEL}</span>` : "");

  document.getElementById("subtitle").textContent =
    `v5 · ${periodLabel} · ${s.total_days} 天 · ${(s.total_orders/10000).toFixed(1)} 万单 · 数据驱动 ECharts 实时渲染`;

  // 侧边栏概览
  if (CURRENT_DATA.daily && CURRENT_DATA.daily.length > 0) {
    const d0 = CURRENT_DATA.daily[0].date;
    const d1 = CURRENT_DATA.daily[CURRENT_DATA.daily.length - 1].date;
    const fmt = d => d.substring(5, 7) + "月" + d.substring(8, 10) + "日";
    document.getElementById("navDateRange").textContent = day !== "all" ? `${month} ${day} 日` : `${fmt(d0)} ~ ${fmt(d1)}`;
  }
  document.getElementById("navTotalOrders").textContent = `${s.total_orders.toLocaleString()} 单`;
  document.getElementById("navDimCount").textContent =
    `${CURRENT_DATA.airline.length} 航司 / ${CURRENT_DATA.platform.length} 平台 / ${CURRENT_DATA.channel.length} 渠道`;

  renderAll();
}

/* ============== 工具函数 ============== */
const fmt = {
  num: n => n.toLocaleString("zh-CN"),
  pct: n => n.toFixed(1) + "%",
  money: n => (n >= 0 ? "+" : "") + n.toLocaleString("zh-CN", { maximumFractionDigits: 0 }),
  avg: n => (n >= 0 ? "+¥" : "-¥") + Math.abs(n).toFixed(2),
  date: s => s.substring(5),  // "2026-05-01" -> "05-01"
  // D30：各平台表格 cell 涨/降/百分比 显示
  // cur = 当前值, prev = 前一日值
  // 返回 HTML：<b>当前值</b><br><span class="delta-pos/neg/zero">▲/▼/─ ±差值 (±%)</span>
  cellDelta: (cur, prev) => {
    cur = Number(cur) || 0;
    prev = Number(prev) || 0;
    if (cur === 0 && prev === 0) {
      return `<div class="delta-cell"><b>0</b> <span class="delta-zero">—</span></div>`;
    }
    if (prev === 0) {
      // 昨天没单（新增/新平台/昨日无数据）
      return `<div class="delta-cell"><b>${fmt.num(cur)}</b> <span class="delta-pos">▲ +${fmt.num(cur)} (新增)</span></div>`;
    }
    const diff = cur - prev;
    const pct = (diff / prev) * 100;
    const arrow = diff > 0 ? "▲" : (diff < 0 ? "▼" : "─");
    const sign = diff > 0 ? "+" : (diff < 0 ? "" : "");
    const signPct = pct > 0 ? "+" : (pct < 0 ? "" : "");
    const cls = diff > 0 ? "delta-pos" : (diff < 0 ? "delta-neg" : "delta-zero");
    return `<div class="delta-cell"><b>${fmt.num(cur)}</b> <span class="${cls}">${arrow}${sign}${fmt.num(diff)} (${signPct}${pct.toFixed(1)}%)</span></div>`;
  },
  // 对比徽章：返回 HTML 字符串
  // cur: 当前值  base: 上期值（用于算 diff 和 %）
  // mode: "rate"（值越高越好，比如覆盖率）、"amount"（值越低越好，比如亏损单）
  //        → 影响颜色方向
  // isPct: 基准是否按百分数显示（true → "96.6%"，false → "8,591"）
  // isMoney: 基准是否按金额显示（true → "¥96,000"）
  cmp: (cur, base, mode, isPct, isMoney = false) => {
    if (base === null || base === undefined || isNaN(base) || base === 0) {
      return `<span class="cmp-no">vs 上期: 无数据</span>`;
    }
    const diff = cur - base;
    const pctChange = (diff / Math.abs(base)) * 100;
    const arrow = diff > 0 ? "▲" : (diff < 0 ? "▼" : "·");
    let color = "#7a8ba0";
    if (diff !== 0) {
      if (mode === "rate") color = diff > 0 ? "#00ff88" : "#ff4757";   // 涨绿跌红
      else if (mode === "amount") color = diff < 0 ? "#00ff88" : "#ff4757"; // 跌绿涨红
    }
    // 格式化基准值（显示上期实际数值）
    let baseStr;
    if (isPct) {
      baseStr = `${base.toFixed(1)}%`;
    } else if (isMoney) {
      const sign = base >= 0 ? "+" : "-";
      baseStr = `¥${sign}${Math.abs(Math.round(base)).toLocaleString("zh-CN")}`;
    } else {
      baseStr = fmt.num(Math.round(base));
    }
    const signPct = pctChange > 0 ? "+" : (pctChange < 0 ? "" : "");
    return `<span class="cmp-badge" style="color:${color}">${arrow} ${baseStr} (${signPct}${pctChange.toFixed(1)}%)</span>`;
  }
};

const color = {
  A: "#00ff88",   // 全自动成功 - 绿
  B: "#ffa502",   // 转人工 - 黄
  C: "#7a8ba0",   // 纯人工 - 灰
  D: "#ff4757",   // 异常 - 红
  cyan: "#00e5ff",
};

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].dispose();
    delete chartInstances[id];
  }
}

function createChart(id, option) {
  destroyChart(id);
  const dom = document.getElementById(id);
  if (!dom) return;
  const c = echarts.init(dom, "dark", { renderer: "canvas" });
  c.setOption(option);
  chartInstances[id] = c;
}

/* v10.9 新增（2026-06-23）：渲染 4 路径订单对比明细表
 * 2026-07-20 简化：只保留订单对比表，利润表已删（用户要"4 路径利润对比"从总览删除）
 */
function renderPathComparisonTables() {
  const s = CURRENT_DATA.summary;
  const cs = COMPARE_DATA ? COMPARE_DATA.summary : null;
  const pathOrder = [
    { key: "A", label: "A", color: color.A },
    { key: "B", label: "B", color: color.B },
    { key: "C", label: "C", color: color.C },
    { key: "D", label: "D", color: color.D },
  ];
  // 工具：变化箭头
  const fmtDiff = (diff) => {
    if (diff === null || diff === undefined) return '<span style="color:#7a8ba0">—</span>';
    const sign = diff > 0 ? "+" : (diff < 0 ? "" : "·");
    const arrow = diff > 0 ? "↑" : (diff < 0 ? "↓" : "→");
    const c = diff > 0 ? "#00d4aa" : (diff < 0 ? "#ff4757" : "#7a8ba0");
    return `<span style="color:${c}">${arrow} ${sign}${fmt.num(diff)}</span>`;
  };
  // 1) 订单对比表
  const ordersHtml = `<table class="path-compare-table">
    <thead>
      <tr><th>路径</th><th>订单数</th><th>占比</th><th>${cs ? "对比基准" : ""}</th><th>${cs ? "变化" : ""}</th></tr>
    </thead>
    <tbody>
      ${pathOrder.map(p => {
        const cur = s[p.key] || 0;
        const prev = cs ? (cs[p.key] || 0) : null;
        const diff = prev !== null ? cur - prev : null;
        const ratio = s.total_orders ? (cur / s.total_orders * 100).toFixed(1) + "%" : "—";
        return `<tr>
          <td><span style="display:inline-block;width:10px;height:10px;background:${p.color};border-radius:2px;margin-right:6px;vertical-align:middle"></span>${p.label}</td>
          <td>${fmt.num(cur)}</td>
          <td>${ratio}</td>
          <td>${prev !== null ? fmt.num(prev) : '<span style="color:#7a8ba0">—</span>'}</td>
          <td>${fmtDiff(diff)}</td>
        </tr>`;
      }).join("")}
    </tbody>
  </table>`;
  const el1 = document.getElementById("table-pathOrders");
  if (el1) el1.innerHTML = ordersHtml;
  // 2026-07-20 删：利润对比表（用户要把"4 路径利润对比"从总览页完全删除）
}

/* ============== 页面：今日时段（2026-07-18 新增）============== */
function renderHourly() {
  // 2026-07-20 重构：按 period 选 hourly 数据源
  //   选 day：daily_detail[date].summary.hourly_today
  //   选 week：聚合 W 内 daily 的 hourly
  //   选 month：month.summary.hourly_today（该月最后一天）
  //   选 all month：聚合所有月最后一天 hourly
  //   25 个 hour bucket (0-24)，24:00 = hour 0 的数据（端点）

  // 计算 period label + hourly 数据源
  let hourlyArr = null;  // 24 hour × 聚合 source
  let dateLabel = "";
  const m = (CURRENT_MONTH && CURRENT_MONTH !== "all") ? DATA.months[CURRENT_MONTH] : null;

  if (CURRENT_DAY && CURRENT_DAY !== "all" && m) {
    // 选某日：取该日 hourly_today
    const dateKey = `${m.month}-${String(CURRENT_DAY).padStart(2, "0")}`;
    const day = m.daily_detail && m.daily_detail[dateKey];
    if (day && day.summary && day.summary.hourly_today) {
      hourlyArr = [day.summary.hourly_today.data];
      dateLabel = dateKey;
    }
  } else if (CURRENT_WEEK && CURRENT_WEEK !== "all" && m) {
    // 选周：聚合 W 内所有日 hourly
    const [mKey, wKey] = CURRENT_WEEK.split("|");
    const mData = DATA.months[mKey];
    const weekInfo = mData && mData.summary && mData.summary.natural_weekly
      ? mData.summary.natural_weekly.find(w => w.week === wKey)
      : null;
    if (weekInfo && mData.daily_detail) {
      hourlyArr = weekInfo.days
        .map(d => mData.daily_detail[d] && mData.daily_detail[d].summary && mData.daily_detail[d].summary.hourly_today
          ? mData.daily_detail[d].summary.hourly_today.data
          : null)
        .filter(x => x);
      dateLabel = `${mKey} ${wKey}（${weekInfo.date_range}）`;
    }
  } else if (CURRENT_MONTH && CURRENT_MONTH !== "all" && m) {
    // 选某月：该月 hourly_today（最后一天）
    if (m.summary && m.summary.hourly_today) {
      hourlyArr = [m.summary.hourly_today.data];
      dateLabel = m.summary.hourly_today.date;
    }
  } else {
    // 选 all month：聚合所有月最后一天 hourly
    const all = Object.values(DATA.months || {})
      .map(mm => mm.summary && mm.summary.hourly_today)
      .filter(x => x);
    if (all.length) {
      hourlyArr = all.map(x => x.data);
      dateLabel = "全部月份（聚合）";
    }
  }

  if (!hourlyArr || !hourlyArr.length) {
    document.getElementById("mainArea").innerHTML = `
      <div class="section">
        <div class="section-title">🕐 时段分析（0-24 点 · 1 小时单位）</div>
        <div style="padding:40px;text-align:center;color:#7a8ba0">
          ⚠️ 暂无 hourly 数据
        </div>
      </div>`;
    return;
  }

  // 聚合多源（如 week 聚合 N 天）：按 hour 加和
  const aggregated = Array.from({ length: 24 }, (_, h) => {
    let total = 0, A = 0, B = 0, C = 0, D = 0;
    for (const arr of hourlyArr) {
      const row = arr.find(r => r.hour === h);
      if (row) {
        total += row.total; A += row.A; B += row.B; C += row.C; D += row.D;
      }
    }
    const auto = A + B;
    return {
      hour: h, total, A, B, C, D,
      auto_coverage_rate: total ? (auto / total * 100) : 0,
      auto_succ_rate: auto ? (A / auto * 100) : 0,
    };
  });

  // 25 hour bucket：0-24（hour 24 = 24:00 端点 = hour 23 数据，代表"23:00-24:00 整 1 小时"）
  const fullData = [...aggregated, { ...aggregated[23], hour: 24 }];

  const total = fullData.reduce((s, r) => s + r.total, 0);
  const totalA = fullData.reduce((s, r) => s + r.A, 0);
  const totalB = fullData.reduce((s, r) => s + r.B, 0);
  const totalC = fullData.reduce((s, r) => s + r.C, 0);
  const totalD = fullData.reduce((s, r) => s + r.D, 0);

  // 表格行（25 行，0-24；hour 24 = 0 单端点）
  const tableRows = fullData.map(r => {
    const auto = r.A + r.B;
    const succ = auto > 0 ? (r.A / auto * 100).toFixed(1) : "—";
    const label = `${String(r.hour).padStart(2, "0")}:00`;
    return `<tr>
      <td><b>${label}</b></td>
      <td style="text-align:right">${r.total.toLocaleString()}</td>
      <td style="text-align:right;color:#ff4757">${r.A.toLocaleString()}</td>
      <td style="text-align:right;color:#ff6348">${r.B.toLocaleString()}</td>
      <td style="text-align:right;color:#ffa502">${r.C.toLocaleString()}</td>
      <td style="text-align:right;color:#7a8ba0">${r.D.toLocaleString()}</td>
      <td style="text-align:right">${succ}%</td>
    </tr>`;
  }).join("");

  const html = `
    <div class="section">
      <div class="section-title">🕐 时段分析（${dateLabel} · 0-24 点 · 1 小时单位）
        <span class="badge badge-info">${dateLabel}</span>
      </div>

      <div class="kpi-row cols-4">
        <div class="kpi">
          <div class="kpi-label">总单数</div>
          <div class="kpi-value">${total.toLocaleString()}</div>
          <div class="kpi-foot">${dateLabel} 0-24 点</div>
        </div>
        <div class="kpi" style="border-color:#ff4757">
          <div class="kpi-label" style="color:#ff4757">A 全自动成功</div>
          <div class="kpi-value" style="color:#ff4757">${totalA.toLocaleString()}</div>
          <div class="kpi-foot">${total ? (totalA / total * 100).toFixed(1) : 0}% 占总单数</div>
        </div>
        <div class="kpi" style="border-color:#ff6348">
          <div class="kpi-label" style="color:#ff6348">B 全自动失败</div>
          <div class="kpi-value" style="color:#ff4757">${totalB.toLocaleString()}</div>
          <div class="kpi-foot">${total ? (totalB / total * 100).toFixed(1) : 0}% 占总单数</div>
        </div>
        <div class="kpi" style="border-color:#ffa502">
          <div class="kpi-label" style="color:#ffa502">C 订单转人工</div>
          <div class="kpi-value" style="color:#ffa502">${totalC.toLocaleString()}</div>
          <div class="kpi-foot">${total ? (totalC / total * 100).toFixed(1) : 0}% 占总单数</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📈 折线趋势图（4 路径每小时比率 · 0-24 点）</div>
      <div class="chart-hint">A 自动出票成功率 = A/(A+B)，B 失败率 = B/(A+B)，C 人工率 = C/总，D 异常率 = D/总。pin 标记每条线的最高/最低点。25 个 hour bucket（0-24）：hour 24 = 24:00 = "23:00-24:00 整 1 小时"（= hour 23 数据）。</div>
      <div id="chart-hourly-line" style="height:420px"></div>
    </div>

    <div class="section">
      <div class="section-title">📊 24 小时分桶明细（0-23 点 · 凌晨到深夜）</div>
      <table class="detail-table">
        <thead><tr><th>时段</th><th style="text-align:right">总单数</th>
          <th style="text-align:right;color:#ff4757">A 全自动成功</th>
          <th style="text-align:right;color:#ff6348">B 全自动失败</th>
          <th style="text-align:right;color:#ffa502">C 订单转人工</th>
          <th style="text-align:right;color:#7a8ba0">D 订单处理中</th>
          <th style="text-align:right">自动化成功率</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;
  document.getElementById("mainArea").innerHTML = html;

  // 渲染 ECharts 折线图（25 hour · 4 路径 + max/min 标记）
  setTimeout(() => {
    const hours = fullData.map(r => r.hour === 24 ? "24:00" : `${String(r.hour).padStart(2, "0")}:00`);
    const lineChart = echarts.init(document.getElementById("chart-hourly-line"));
    lineChart.setOption({
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "cross", label: { backgroundColor: "#1e3a5f" } }
      },
      legend: { top: 0, textStyle: { color: "#aab5c5" } },
      grid: { top: 50, left: 60, right: 30, bottom: 60 },
      toolbox: { feature: { saveAsImage: {} } },
      xAxis: {
        type: "category",
        boundaryGap: false,
        data: hours,
        axisLabel: { color: "#aab5c5", rotate: 45, fontSize: 10, interval: 0 },
        axisLine: { lineStyle: { color: "#1e3a5f" } }
      },
      yAxis: {
        type: "value",
        name: "路径比率(%)",
        min: 0, max: 100,
        axisLabel: { color: "#aab5c5", formatter: "{value}%" },
        splitLine: { lineStyle: { color: "#1e3a5f40" } }
      },
      series: [
        { name: "A 路径 · 自动出票成功率", type: "line", smooth: true, symbol: "circle", symbolSize: 8,
          lineStyle: { color: "#ff4757", width: 3 },
          itemStyle: { color: "#ff4757" },
          markPoint: {
            symbol: "pin", symbolSize: 50,
            data: [
              { type: "max", name: "最高", itemStyle: { color: "#00ff88" } },
              { type: "min", name: "最低", itemStyle: { color: "#ff4757" } }
            ],
            label: { color: "#fff", fontSize: 10 }
          },
          data: fullData.map(r => (r.A + r.B) ? +(r.A / (r.A + r.B) * 100).toFixed(2) : 0) },
        { name: "B 路径 · 自动出票失败率", type: "line", smooth: true, symbol: "circle", symbolSize: 8,
          lineStyle: { color: "#ff6348", width: 3 },
          itemStyle: { color: "#ff6348" },
          markPoint: {
            symbol: "pin", symbolSize: 50,

              { type: "max", name: "最高", itemStyle: { color: "#00ff88" } },

            ],

          },
          data: fullData.map(r => r.total ? +(r.C / r.total * 100).toFixed(2) : 0) },
        { name: "D 路径 · 异常率", type: "line", smooth: true, symbol: "circle", symbolSize: 6,
          lineStyle: { color: "#7a8ba0", width: 2, type: "dashed" },

}

/* ============== 页面：流程归因 ============== */
function renderStage() {
  const s = CURRENT_DATA.stage_distribution || [];
  const subs = CURRENT_DATA.stage_subcategory || [];
  const ds = CURRENT_DATA.daily_stage || [];
  const monthLabel = CURRENT_MONTH === "all" ? "全月" : CURRENT_MONTH;
  const totalFail = CURRENT_DATA.total_fail_orders || 0;
  const cs = COMPARE_DATA;  // 对比基准（可能是 day 或 month 维度）

  // 对比数据：找每个 stage 的总单数 / pct
  const cmpStageMap = {};
  if (cs && cs.stage_distribution) {
    cs.stage_distribution.forEach(st => { cmpStageMap[st.stage] = st; });
  }
  const cmpTotalFail = (cs && cs.total_fail_orders) || 0;
  // 对比数据：找每个 subcategory 的 count
  const cmpSubMap = {};
  if (cs && cs.stage_subcategory) {
    cs.stage_subcategory.forEach(sub => { cmpSubMap[sub.category] = sub; });
  }

  // 1. 顶部 KPI 条（每阶段一个）+ 对比徽章
  const kpiHtml = s.map(st => {
    const cmp = cmpStageMap[st.stage];
    // amount 模式：值越低越好（失败阶段少单=好转）
    const cmpBadgeHtml = cmp
      ? fmt.cmp(st.total, cmp.total, "amount", false)
      : `<span class="cmp-no">无对比基准</span>`;
    return `<div class="kpi" style="border-color:${st.color}">
      <div class="kpi-label" style="color:${st.color}">${stageIcon(st.stage)} ${st.stage}</div>
      <div class="kpi-value" style="color:${st.color}">${st.total.toLocaleString()}</div>
      <div class="kpi-foot">${st.pct}% · B:${st.B} D:${st.D}</div>
      <div class="kpi-sub-row">${cmpBadgeHtml}</div>
    </div>`;
  }).join("");

  // 2. 子类表：加 "vs 对比" 列
  const subRows = subs.map(sub => {
    const cmp = cmpSubMap[sub.category];
    const cmpBadgeHtml = cmp
      ? fmt.cmp(sub.count, cmp.count, "amount", false)
      : `<span class="cmp-no">—</span>`;
    return `<tr>
      <td><span style="color:${sub.color}">●</span> ${sub.category}</td>
      <td style="text-align:right">${sub.count.toLocaleString()}</td>
      <td style="text-align:right;color:${sub.color}">${sub.pct}%</td>
      <td style="text-align:right;font-size:11px">${cmpBadgeHtml}</td>
    </tr>`;
  }).join("");

  // 3. 堆叠数据（X=日期，series=6 个阶段）
  const stages = ["预定", "支付", "取票", "回填", "验真", "未走完"];
  const stageColorMap = {};
  s.forEach(st => stageColorMap[st.stage] = st.color);
  const stackSeries = stages.map(st => ({
    name: st,
    type: "bar",
    stack: "total",
    emphasis: { focus: "series" },
    itemStyle: { color: stageColorMap[st] || "#7a8ba0" },
    data: ds.map(d => d[st] || 0)
  }));

  const html = `
    <div class="section">
      <div class="section-title">🔧 流程归因 · ${monthLabel}
        <span class="badge badge-info">B+D 总失败 ${totalFail.toLocaleString()} 单</span>
        ${cs ? `<span class="badge badge-info" style="background:#1e3a5f">对比 ${COMPARE_LABEL}</span>` : ""}
      </div>
      <div class="kpi-row cols-6">${kpiHtml}</div>
    </div>

    <div class="section">
      <div class="section-title">📊 阶段占比 · 5 大流程 + 兜底</div>
      <div id="chartStagePie" style="height:380px"></div>
    </div>

    <div class="section">
      <div class="section-title">📅 每日失败原因 · 阶段堆叠柱状图</div>
      <div class="chart-hint">点击图例可隐藏/显示某个阶段。柱越高 = 当天失败单越多。</div>
      <div id="chartDailyStack" style="height:420px"></div>
    </div>

    <div class="section">
      <div class="section-title">🗂 失败原因子类明细（按阶段排序）</div>
      <table class="detail-table">
        <thead><tr><th>类别</th><th style="text-align:right">单数</th><th style="text-align:right">占失败%</th>
          ${cs ? '<th style="text-align:right">vs ' + COMPARE_LABEL + '</th>' : ''}
        </tr></thead>
        <tbody>${subRows}</tbody>
      </table>
    </div>
  `;
  document.getElementById("mainArea").innerHTML = html;

  // 渲染两个图
  setTimeout(() => {
    // 饼图：tooltip 加对比信息
    const pieData = s.map(st => ({ name: st.stage, value: st.total, itemStyle: { color: st.color } }));
    const pie = echarts.init(document.getElementById("chartStagePie"));
    pie.setOption({
      tooltip: {
        trigger: "item",
        formatter: (p) => {
          const cmp = cmpStageMap[p.name];
          const cur = p.value;
          const curPct = p.percent;
          if (!cmp) {
            return `${p.name}<br/>当前: ${cur.toLocaleString()} (${curPct.toFixed(1)}%)`;
          }
          const diff = cur - cmp.total;
          const cmpPct = cmpTotalFail ? (cmp.total / cmpTotalFail * 100).toFixed(1) : 0;

// v10：环节颜色映射（一眼可辨哪一环出问题了）
// 注：全局函数，被 renderFail 和 stageSummaryHtml 都要用
function getStageColor(famName) {
if (!famName) return "#7a8ba0";
if (famName.startsWith("人工环节")) return "#ff6b9d";        // 粉红
if (famName.startsWith("系统环节")) return "#ffd93d";        // 金黄
if (famName.startsWith("预定环节")) return "#ff4757";        // 红色（高频）
if (famName.startsWith("支付环节")) return "#ff6348";        // 橙红
if (famName.startsWith("取票环节")) return "#ffa502";        // 橙色
if (famName.startsWith("验真环节")) return "#9c88ff";        // 紫色
if (famName.startsWith("回填环节")) return "#70a1ff";        // 蓝色
if (famName.startsWith("平台环节")) return "#5f27cd";        // 深紫
if (famName.startsWith("其他环节")) return "#7a8ba0";        // 灰色
return "#00e5ff";
}

// v10：环节分组（按 8 大环节分组聚合）
// 注：全局函数，被 renderFail 和 stageSummaryHtml 都要用
function groupByStage(families) {
const STAGE_ORDER = [
"人工环节", "系统环节", "预定环节", "支付环节",
"取票环节", "验真环节", "回填环节", "平台环节", "其他环节"
];
const stageMap = {};
STAGE_ORDER.forEach(s => stageMap[s] = 0);
families.forEach(f => {
const stage = (f.family || "").split("-")[0];
if (stageMap[stage] === undefined) stageMap["其他环节"] += f.count;
else stageMap[stage] += f.count;
});
return STAGE_ORDER
.map(s => ({ stage: s, count: stageMap[s] }))
.filter(x => x.count > 0)
.sort((a, b) => b.count - a.count);
}

/* ============== 失败分析（v12 纯失败根因，删掉流程归因） ==============
 * - 8 大环节族级表（B/D 垂直堆叠）—— 失败归因
 * - 流程归因已删（漏斗图 + KPI 条 + 子分类明细都不要了，避免和族级重复）
 *
 * 设计动机（2026-06-20 改进）：
 * 用户反馈流程归因 + 失败根因并存重复，且 B 路径族展开卡顿。
 *   1. 删流程归因：流程归因用"失败原因"当前卡点 vs 失败根因用"第一次失败原因"根因，
 *      两套数据不同但容易被用户混淆。保留更精准的失败根因。
 *   2. 修 B 路径卡顿：之前每次点族行要遍历 1526 项 reason × 37 条正则 = 5.6 万次匹配。
 *      现在后端预计算 family 字段，前端直接 O(1) 比较。
 */
function renderFailureAnalysis() {
  // 1. 失败根因数据（B/D）
  // v10.14.7（2026-07-03）：根据"选月/选日"切换数据源
  //   - 选月（day="all"）：用顶层 fail_reasons_B（prev_count=上月）
  //   - 选日（day!=all）：用 daily_detail[date].fail_reasons_B（prev_count=前一天）
  const isDayView = CURRENT_DAY && CURRENT_DAY !== "all";
  let curMonthData = CURRENT_DATA.months && CURRENT_DATA.months[CURRENT_MONTH];
  let curFailReasonsB, curFailReasonsD, curFailFamiliesB, curFailFamiliesD;
  let curSummaryB, curSummaryD, curTotalB, curTotalD;
  if (isDayView && curMonthData && curMonthData.daily_detail) {
    const dateKey = `${CURRENT_MONTH}-${CURRENT_DAY.padStart(2, "0")}`;
    const dayData = curMonthData.daily_detail[dateKey];
    if (dayData) {
      curFailReasonsB = dayData.fail_reasons_B || [];
      curFailReasonsD = dayData.fail_reasons_D || [];
      curFailFamiliesB = dayData.fail_families_B || [];
      curFailFamiliesD = dayData.fail_families_D || [];
      curSummaryB = dayData.summary.B;
      curSummaryD = dayData.summary.D;
      curTotalB = dayData.summary.total_orders;
      curTotalD = dayData.summary.total_orders;
    }
  }
  // 兜底：如果日表没数据 / 选月视图，用顶层
  if (!curFailReasonsB) {
    curFailReasonsB = CURRENT_DATA.fail_reasons_B || [];
    curFailReasonsD = CURRENT_DATA.fail_reasons_D || [];
    curFailFamiliesB = CURRENT_DATA.fail_families_B || [];
    curFailFamiliesD = CURRENT_DATA.fail_families_D || [];
    curSummaryB = CURRENT_DATA.summary.B;
    curSummaryD = CURRENT_DATA.summary.D;
    curTotalB = CURRENT_DATA.summary.total_orders;
    curTotalD = CURRENT_DATA.summary.total_orders;
  }

  const cs = COMPARE_DATA;

  const bFamilies = (curFailFamiliesB || []).slice(0, 30);
  const dFamilies = (curFailFamiliesD || []).slice(0, 30);

  const cmpBMap = {};
  const cmpDMap = {};
  if (cs) {
    (cs.fail_reasons_B || []).forEach(r => { cmpBMap[r.full] = r; });
    (cs.fail_reasons_D || []).forEach(r => { cmpDMap[r.full] = r; });
  }
  const cmpBFamMap = {};
  const cmpDFamMap = {};
  if (cs) {
    (cs.fail_families_B || []).forEach(f => { cmpBFamMap[f.family] = f; });
    (cs.fail_families_D || []).forEach(f => { cmpDFamMap[f.family] = f; });
  }

  // 2. 失败根因族级行
  const bFamilyRow = (f, i) => {
    const cmp = cmpBFamMap[f.family];
    const cmpBadge = cs
      ? (cmp ? fmt.cmp(f.count, cmp.count, "amount", false) : `<span style="color:#7a8ba0">新增</span>`)
      : "—";
    const stageColor = getStageColor(f.family);
    return `<tr onclick="toggleFamilyDrill('B', ${i}, this)" style="cursor:pointer" data-fam-idx="${i}">
      <td>${i + 1}</td>
      <td><span style="display:inline-block;width:10px;height:10px;background:${stageColor};border-radius:2px;margin-right:6px"></span><span style="color:#00e5ff">▸ </span><strong>${escapeHtml(f.family)}</strong></td>
      <td>${fmt.num(f.count)}</td>
      <td>${fmt.pct(f.count / curSummaryB * 100)}</td>
      <td style="font-size:11px">${cmpBadge}</td>
    </tr>`;
  };
  const dFamilyRow = (f, i) => {
    const cmp = cmpDFamMap[f.family];
    const cmpBadge = cs
      ? (cmp ? fmt.cmp(f.count, cmp.count, "amount", false) : `<span style="color:#7a8ba0">新增</span>`)
      : "—";
    const stageColor = getStageColor(f.family);
    return `<tr onclick="toggleFamilyDrill('D', ${i}, this)" style="cursor:pointer" data-fam-idx="${i}">
      <td>${i + 1}</td>
      <td><span style="display:inline-block;width:10px;height:10px;background:${stageColor};border-radius:2px;margin-right:6px"></span><span style="color:#00e5ff">▸ </span><strong>${escapeHtml(f.family)}</strong></td>
      <td>${fmt.num(f.count)}</td>
      <td>${fmt.pct(f.count / curSummaryD * 100)}</td>
      <td style="font-size:11px">${cmpBadge}</td>
    </tr>`;
  };

  // 3. 失败根因族级环节汇总条
  const bStages = groupByStage(curFailFamiliesB || []);
  const dStages = groupByStage(curFailFamiliesD || []);
  const stageSummaryHtml = (stages, total) => {
    if (!stages.length) return "";
    const cells = stages.map(s => {
      const color = getStageColor(s.stage + "-x");
      return `<div style="flex:1;min-width:90px;background:#0a1929;border-left:3px solid ${color};padding:8px 10px;margin-right:6px;border-radius:3px">
        <div style="font-size:11px;color:#7a8ba0">${escapeHtml(s.stage)}</div>
        <div style="font-size:18px;font-weight:bold;color:${color}">${fmt.num(s.count)}</div>
        <div style="font-size:10px;color:#7a8ba0">${fmt.pct(s.count / total * 100)}</div>
      </div>`;
    }).join("");
    return `<div style="display:flex;flex-wrap:wrap;margin-bottom:12px">${cells}</div>`;
  };

  const cmpBHdr = cs
    ? `<span class="badge badge-info" style="background:#1e3a5f">对比 ${COMPARE_LABEL}：B ${fmt.num(cs.summary.B)} 单</span>`
    : "";
  const cmpDHdr = cs
    ? `<span class="badge badge-info" style="background:#1e3a5f">对比 ${COMPARE_LABEL}：D ${fmt.num(cs.summary.D)} 单</span>`
    : "";

  // 4. HTML 主体：B 路径族级 + D 路径族级（垂直堆叠）
  const html = `
    <div class="section">
      <div class="section-title">⚠️ B 路径失败根因（按出票环节 · ${fmt.num(curSummaryB)} 单）
        <span class="badge badge-warn">点击族名展开原始 Top 5</span>
        ${cmpBHdr}
      </div>
      <div class="chart-hint" style="margin-bottom:8px">
        8 大环节（人工/系统/预定/支付/取票/验真/回填/平台）+ 其他。色块编码 = 环节类别。
      </div>
      <div class="chart-box" style="margin-top:14px">
        <div class="chart-title">🎯 B 路径 8 大环节汇总（哪一环出问题）</div>
        ${stageSummaryHtml(bStages, curSummaryB)}
      </div>
      <div class="chart-box" style="margin-top:14px">
        <div class="chart-title">📋 B 路径 失败根因 Top 30（族级，按环节色编码）</div>
        <table class="data-table">
          <thead>
            <tr><th>排名</th><th>族名</th><th>单数</th><th>占比（B 路径）</th>
              ${cs ? '<th>vs ' + COMPARE_LABEL + '</th>' : ''}
            </tr>
          </thead>
          <tbody id="bFamilyTbody">${bFamilies.map(bFamilyRow).join("")}</tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🚨 D 路径失败根因（按出票环节 · ${fmt.num(curSummaryD)} 单）
        ${cmpDHdr}
      </div>
      <div class="chart-box" style="margin-top:14px">
        <div class="chart-title">🎯 D 路径 8 大环节汇总（哪一环出问题）</div>
        ${stageSummaryHtml(dStages, curSummaryD)}
      </div>
      <div class="chart-box" style="margin-top:14px">
        <div class="chart-title">📋 D 路径 失败根因 Top 30（族级，按环节色编码）</div>
        <table class="data-table">
          <thead>
            <tr><th>排名</th><th>族名</th><th>单数</th><th>占比（D 路径）</th>
              ${cs ? '<th>vs ' + COMPARE_LABEL + '</th>' : ''}
            </tr>
          </thead>
          <tbody id="dFamilyTbody">${dFamilies.map(dFamilyRow).join("")}</tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById("mainArea").innerHTML = html;
  // v10.14.7: 把当前视图的数据存全局变量，供 toggleFamilyDrill / toggleExpandFamily 用
  CURRENT_FAIL_FAMILIES_B = curFailFamiliesB;
  CURRENT_FAIL_FAMILIES_D = curFailFamiliesD;
  CURRENT_FAIL_REASONS_B = curFailReasonsB;
  CURRENT_FAIL_REASONS_D = curFailReasonsD;
  CURRENT_FAIL_VIEW = isDayView ? "daily" : "monthly";
}


/* ============== 失败根因下钻面板 ============== */
let currentDrillKey = null;  // 当前展开的下钻，格式 "B-3" 或 "D-5"
let currentFamilyKey = null; // 当前展开的族，格式 "fam-B-0"
let currentFamilyExpanded = false; // 当前族展开是否显示全部 reason（默认 Top 20）

// 族展开里的 reason 表格渲染（v12 拆出来单独函数，支持"展开全部"切换）
// v10.14.7（2026-07-03）：prevLabel 动态显示（不再是写死"前一天"）
function renderFamilyReasonRows(reasons, allReasons, path, fam, expanded) {
  const shown = expanded ? reasons : reasons.slice(0, 20);
  // v10.14.7: prevLabel 根据"选月/选日"动态显示
  const isDayView = CURRENT_DAY && CURRENT_DAY !== "all";
  const rows = shown.map((r, i) => {
    const prev = r.prev_count || 0;
    const diff = r.count - prev;
    const diffSign = diff > 0 ? "+" : (diff < 0 ? "" : "±");
    const diffColor = diff > 0 ? "#00d4aa" : (diff < 0 ? "#ff4757" : "#7a8ba0");
    const diffArrow = diff > 0 ? "↑" : (diff < 0 ? "↓" : "→");
    const prevLabel = isDayView ? "前一天" : (r.prev_month || "上月");
    return `
    <tr>
      <td>${i + 1}</td>
      <td title="${escapeHtml(r.full)}">${escapeHtml(r.reason)}</td>
      <td>${fmt.num(r.count)}</td>
      <td>${fmt.pct(r.count / fam.count * 100)}</td>
      <td style="color:${diffColor}">${diffArrow} ${diffSign}${fmt.num(diff)}</td>
      <td style="color:#7a8ba0">${fmt.num(prev)} <span style="font-size:10px">(${prevLabel})</span></td>
      <td>
        <button class="drill-btn" onclick="toggleDrill('${path}', ${allReasons.indexOf(r)}, this.closest('tr'))">5 维度下钻 ▾</button>
      </td>
    </tr>
  `}).join("");
  // 底部按钮：展开全部 / 收起回 Top 20
  const expandBtn = reasons.length > 20 ? `
    <tr>
      <td colspan="7" style="text-align:center;padding:10px">
        <button class="drill-btn" onclick="toggleExpandFamily()" style="min-width:200px">
          ${expanded ? `▲ 收起（仅显示前 20 条）` : `▼ 展开全部 ${reasons.length} 条`}
        </button>
      </td>
    </tr>
  ` : "";
  return rows + expandBtn;
}

// 切换"展开全部 / 收起"按钮的回调（重新渲染 tbody）
function toggleExpandFamily() {
  currentFamilyExpanded = !currentFamilyExpanded;
  // 找当前族展开面板的 tbody，替换 innerHTML
  const panel = document.querySelector("#family-drill-row .family-subtable tbody");
  if (!panel) return;
  // 从 DOM 上读出当前族的 path 和 idx（用 currentFamilyKey 解析）
  const key = currentFamilyKey; // 形如 "fam-B-3"
  const m = key && key.match(/^fam-([BD])-(\d+)$/);
  if (!m) return;
  const path = m[1], famIdx = parseInt(m[2]);
  const families = path === "B" ? (CURRENT_FAIL_FAMILIES_B || []) : (CURRENT_FAIL_FAMILIES_D || []);
  const allReasons = path === "B" ? (CURRENT_FAIL_REASONS_B || []) : (CURRENT_FAIL_REASONS_D || []);
  const fam = families[famIdx];
  const reasons = allReasons.filter(r => r.family === fam.family);
  panel.innerHTML = renderFamilyReasonRows(reasons, allReasons, path, fam, currentFamilyExpanded);
}

// 族级展开：显示该族下所有原始原因（清洗后但未族聚合）
function toggleFamilyDrill(path, famIdx, rowEl) {
  const key = `fam-${path}-${famIdx}`;
  if (currentFamilyKey === key) {
    collapseFamilyDrill();
    return;
  }
  collapseFamilyDrill();
  collapseDrill();
  const families = path === "B" ? (CURRENT_FAIL_FAMILIES_B || []) : (CURRENT_FAIL_FAMILIES_D || []);
  const allReasons = path === "B" ? (CURRENT_FAIL_REASONS_B || []) : (CURRENT_FAIL_REASONS_D || []);
  const fam = families[famIdx];
  if (!fam) return;
  currentFamilyKey = key;
  currentFamilyExpanded = false; // 默认折叠状态

  // v12 优化：直接读 r.family（后端预计算好的），不再每次调 getFamily
  const reasons = allReasons.filter(r => r.family === fam.family);

  // 在族行下方插入二级面板
  const colspan = 5;
  const tr = rowEl;
  const newTr = document.createElement("tr");
  newTr.id = "family-drill-row";
  newTr.classList.add("drill-row");
  // 标题 + 关闭按钮 + 原始原因表格 + 5 维度钻取按钮
  newTr.innerHTML = `<td colspan="${colspan}" style="padding:0; background:#0a1424">
    <div class="drill-panel">
      <div class="drill-header">
        <div class="drill-title">
          <span style="color:#00e5ff">▾ ${escapeHtml(fam.family)}</span>
          <span class="badge badge-info" style="margin-left:8px">${fmt.num(fam.count)} 单</span>
          <span class="badge badge-warn" style="margin-left:4px">包含 ${reasons.length} 个原始根因</span>
        </div>
        <button class="drill-close" onclick="collapseFamilyDrill()">收起 ✕</button>
      </div>
      <div class="family-subtable">
        <table class="data-table">
          <thead>
            <tr><th style="width:50px">#</th><th>原始根因（清洗后）</th><th>单数</th><th>占比</th><th>vs 基准</th><th>基准单数</th><th>钻取</th></tr>
          </thead>
          <tbody>
            ${renderFamilyReasonRows(reasons, allReasons, path, fam, currentFamilyExpanded)}
          </tbody>
        </table>
      </div>
    </div>
  `;
  tr.parentNode.insertBefore(newTr, tr.nextSibling);
}

function collapseFamilyDrill() {
  const el = document.getElementById("family-drill-row");
  if (el) el.remove();
  currentFamilyKey = null;
  currentFamilyExpanded = false;
}

function toggleDrill(path, idx, rowEl) {
  const key = `${path}-${idx}`;
  // 同一个面板再次点击：收起
  if (currentDrillKey === key) {
    collapseDrill();
    return;
  }
  // 收起旧的，展开新的
  collapseDrill();
  const drillData = (path === "B" ? CURRENT_DATA.fail_drill_B : CURRENT_DATA.fail_drill_D) || [];
  const d = drillData[idx];
  if (!d) return;
  currentDrillKey = key;

  // 在表格行下方插入下钻面板
  const tr = rowEl;
  const colspan = 5;
  const newTr = document.createElement("tr");
  newTr.id = "drill-row";
  newTr.classList.add("drill-row");
  newTr.innerHTML = `<td colspan="${colspan}" style="padding:0; background:#0a1424">
    <div class="drill-panel">
      <div class="drill-header">
        <div class="drill-title">
          <span style="color:#00e5ff">▾ ${escapeHtml(d.reason)}</span>
          <span class="badge badge-info" style="margin-left:8px">${fmt.num(d.total)} 单</span>
          <span class="badge badge-warn" style="margin-left:4px">救回 ${fmt.num(d.rescued_count)} 单（${d.rescue_rate}%）</span>
        </div>
        <button class="drill-close" onclick="collapseDrill()">收起 ✕</button>
      </div>
      <div class="drill-grid">
        <div class="drill-chart">
          <div class="drill-chart-title">📱 平台分布 Top 10</div>
          <div id="drill-${key}-plat" style="height:280px"></div>
        </div>
        <div class="drill-chart">
          <div class="drill-chart-title">✈️ 航司分布 Top 10</div>
          <div id="drill-${key}-air" style="height:280px"></div>
        </div>
        <div class="drill-chart drill-wide">
          <div class="drill-chart-title">🔥 航司 × 平台 交叉热力图</div>
          <div id="drill-${key}-cross" style="height:340px"></div>
        </div>
        <div class="drill-chart">
          <div class="drill-chart-title">📅 日期趋势</div>
          <div id="drill-${key}-date" style="height:240px"></div>
        </div>
        <div class="drill-chart">
          <div class="drill-chart-title">👤 员工救场 Top 10</div>
          <div id="drill-${key}-staff" style="height:240px"></div>
        </div>
      </div>
    </div>
  `;
  tr.parentNode.insertBefore(newTr, tr.nextSibling);

  // 渲染 5 个图表
  setTimeout(() => {
    renderDrillCharts(key, d);
  }, 50);
}

function collapseDrill() {
  const el = document.getElementById("drill-row");
  if (el) el.remove();
  currentDrillKey = null;
}

function renderDrillCharts(key, d) {
  // 1. 平台分布（横向柱）
  if (d.platform_dist && d.platform_dist.length) {
    createChart(`drill-${key}-plat`, {
      ...baseEchartsOpt,
      grid: { left: 90, right: 30, top: 10, bottom: 25 },
      tooltip: { ...baseEchartsOpt.tooltip, trigger: "axis", axisPointer: { type: "shadow" } },
      xAxis: { type: "value", axisLabel: { color: "#b0c4de", fontSize: 10 } },
      yAxis: { type: "category", data: d.platform_dist.map(x => x.name).reverse(), axisLabel: { color: "#b0c4de", fontSize: 10 } },
      series: [{
        type: "bar",
        data: d.platform_dist.map(x => x.count).reverse(),
        itemStyle: { color: "#00e5ff" },
        label: { show: true, position: "right", color: "#00e5ff", fontSize: 10, formatter: "{c}" },
      }],
    });
  }
  // 2. 航司分布
  if (d.airline_dist && d.airline_dist.length) {
    createChart(`drill-${key}-air`, {
      ...baseEchartsOpt,
      grid: { left: 90, right: 30, top: 10, bottom: 25 },
      tooltip: { ...baseEchartsOpt.tooltip, trigger: "axis", axisPointer: { type: "shadow" } },
      xAxis: { type: "value", axisLabel: { color: "#b0c4de", fontSize: 10 } },
      yAxis: { type: "category", data: d.airline_dist.map(x => x.name).reverse(), axisLabel: { color: "#b0c4de", fontSize: 10 } },
      series: [{
        type: "bar",
        data: d.airline_dist.map(x => x.count).reverse(),
        itemStyle: { color: "#ff9f43" },
        label: { show: true, position: "right", color: "#ff9f43", fontSize: 10, formatter: "{c}" },
      }],
    });
  }
  // 3. 航司 × 平台 交叉图
  // 根据维度数动态选图表：
  //   双方都 ≥ 2  → 热力图（标准）
  //   一方只有 1  → 横向条形图（避免 1×N 长条）
  if (d.cross && d.cross.airlines && d.cross.airlines.length && d.cross.platforms && d.cross.platforms.length) {
    const nAir = d.cross.airlines.length;
    const nPlat = d.cross.platforms.length;
    // 汇总：每个 (airline, platform) 的单数
    const pairs = [];
    d.cross.airlines.forEach((a, i) => {
      d.cross.platforms.forEach((p, j) => {
        const v = d.cross.data[i][j];
        if (v > 0) pairs.push({ airline: a, platform: p, count: v });
      });
    });
    pairs.sort((x, y) => y.count - x.count);

    if (nAir >= 2 && nPlat >= 2) {
      // 标准热力图
      const heatData = [];
      d.cross.airlines.forEach((a, i) => {
        d.cross.platforms.forEach((p, j) => {
          heatData.push([j, i, d.cross.data[i][j]]);
        });
      });
      createChart(`drill-${key}-cross`, {
        ...baseEchartsOpt,
        tooltip: {
          position: "top",
          formatter: (p) => {
            const airline = d.cross.airlines[p.value[1]];
            const platform = d.cross.platforms[p.value[0]];
            return `${airline} × ${platform}<br/><b>${p.value[2]}</b> 单`;
          },
        },
        grid: { left: 80, right: 30, top: 20, bottom: 60 },
        xAxis: {
          type: "category",
          data: d.cross.platforms,
          axisLabel: { color: "#b0c4de", fontSize: 10, rotate: 30, interval: 0 },
          splitArea: { show: true },
        },
        yAxis: {
          type: "category",
          data: d.cross.airlines,
          axisLabel: { color: "#b0c4de", fontSize: 10 },
          splitArea: { show: true },
        },
        visualMap: {
          min: 0,
          max: Math.max(...heatData.map(h => h[2])),
          calculable: true,
          orient: "horizontal",
          left: "center",
          bottom: 5,
          textStyle: { color: "#b0c4de", fontSize: 10 },
          inRange: { color: ["#0a1a2e", "#1e3a5f", "#00e5ff", "#ff4757"] },
        },
        series: [{
          name: "失败单数",
          type: "heatmap",
          data: heatData,
          label: {
            show: true,
            color: "#fff",
            fontSize: 10,
            formatter: (p) => p.value[2] > 0 ? p.value[2] : "",
          },
          emphasis: { itemStyle: { shadowBlur: 10, shadowColor: "rgba(0,229,255,0.5)" } },
        }],
      });
    } else {
      // 1×N 或 N×1：横向条形图，按 (airline × platform) 组合排序
      const labels = pairs.map(p => `${p.airline} × ${p.platform}`);
      const data = pairs.map(p => p.count);
      createChart(`drill-${key}-cross`, {
        ...baseEchartsOpt,
        tooltip: {
          ...baseEchartsOpt.tooltip,
          trigger: "axis",
          axisPointer: { type: "shadow" },
          formatter: (params) => {
            const p = params[0];
            const pair = pairs[p.dataIndex];
            return `${pair.airline} × ${pair.platform}<br/><b>${p.value}</b> 单`;
          },
        },
        grid: { left: 140, right: 30, top: 30, bottom: 30 },
        xAxis: { type: "value", axisLabel: { color: "#b0c4de", fontSize: 10 } },
        yAxis: {
          type: "category",
          data: labels.slice().reverse(),
          axisLabel: { color: "#b0c4de", fontSize: 10 },
        },
        series: [{
          type: "bar",
          data: data.slice().reverse(),
          itemStyle: {
            color: (params) => {
              const pair = pairs[data.length - 1 - params.dataIndex];
              return pair.count > d.total * 0.5 ? "#ff4757" : pair.count > d.total * 0.2 ? "#ff9f43" : "#00e5ff";
            },
            borderRadius: [0, 4, 4, 0],
          },
          label: {
            show: true,
            position: "right",
            color: "#fff",
            fontSize: 11,
            fontWeight: "bold",
            formatter: "{c}",
          },
          emphasis: { itemStyle: { shadowBlur: 10, shadowColor: "rgba(0,229,255,0.5)" } },
        }],
      });
    }
  }
  // 4. 日期趋势
  if (d.date_trend && d.date_trend.length) {
    createChart(`drill-${key}-date`, {
      ...baseEchartsOpt,
      grid: { left: 50, right: 20, top: 20, bottom: 50 },
      tooltip: { ...baseEchartsOpt.tooltip, trigger: "axis" },
      xAxis: { type: "category", data: d.date_trend.map(x => x.date.slice(5)), axisLabel: { color: "#b0c4de", fontSize: 9, rotate: 30 } },
      yAxis: { type: "value", axisLabel: { color: "#b0c4de", fontSize: 10 } },
      series: [{
        type: "line",
        data: d.date_trend.map(x => x.count),
        smooth: true,
        itemStyle: { color: "#00e5ff" },
        lineStyle: { color: "#00e5ff", width: 2 },
        areaStyle: { color: "rgba(0,229,255,0.15)" },
      }],
    });
  }
  // 5. 员工救场
  if (d.staff_dist && d.staff_dist.length) {
    createChart(`drill-${key}-staff`, {
      ...baseEchartsOpt,
      grid: { left: 70, right: 20, top: 10, bottom: 25 },
      tooltip: { ...baseEchartsOpt.tooltip, trigger: "axis", axisPointer: { type: "shadow" } },
      xAxis: { type: "value", axisLabel: { color: "#b0c4de", fontSize: 10 } },
      yAxis: { type: "category", data: d.staff_dist.map(x => x.name).reverse(), axisLabel: { color: "#b0c4de", fontSize: 10 } },
      series: [{
        type: "bar",
        data: d.staff_dist.map(x => x.count).reverse(),
        itemStyle: { color: "#00ff88" },
        label: { show: true, position: "right", color: "#00ff88", fontSize: 10, formatter: "{c}" },
      }],
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"}[c]));
}

/* ============== 路由 ============== */
function renderAll() {
  const page = window.location.hash.slice(1) || "overview";
  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.toggle("active", el.dataset.page === page);
  });
  switch (page) {
    case "overview": renderOverview(); break;
    case "hourly": renderHourly(); break;
    case "airline": renderAirline(); break;
    case "platform": renderPlatform(); break;
    case "channel": renderChannel(); break;
    case "staff": renderStaff(); break;
    case "failAnalysis": renderFailureAnalysis(); break;
    // 兼容旧 hash（如果用户收藏了 /stage 或 /fail）
    case "stage": renderFailureAnalysis(); break;
    case "fail": renderFailureAnalysis(); break;
    default: renderOverview();
  }
}

document.querySelectorAll(".nav-item").forEach(el => {
  el.addEventListener("click", () => {
    window.location.hash = el.dataset.page;
  });
});

window.addEventListener("hashchange", renderAll);
window.addEventListener("resize", () => {
  Object.values(chartInstances).forEach(c => c.resize());
});

loadData();
</script>
</body>
</html>
